version: '3.8'

services:
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
        - GH_PAT_PACKAGES=${GH_PAT_PACKAGES}
    image: control-room:latest
    container_name: control-room
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - xfw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  xfw:
    external: true